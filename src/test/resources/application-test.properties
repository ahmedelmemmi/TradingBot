# Test profile – uses H2 in-memory database, no Flyway, no Redis, no Kafka

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=true
spring.datasource.username=sa
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.flyway.enabled=false

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

ml.service.url=http://localhost:9999

trading.symbol=EURUSD
trading.timeframe=M1
trading.mode=PAPER
trading.balance.initial=1000.00
trading.interval.ms=99999999

trading.rules.buy-rsi-min=55
trading.rules.sell-rsi-max=45
trading.rules.adx-min=25
trading.rules.ml-confidence-threshold=0.75
trading.rules.expiry-seconds=60
trading.rules.stake-amount=10.00
trading.rules.payout-percent=80

trading.risk.daily-loss-limit-pct=0.02
trading.risk.max-consecutive-losses=3
trading.risk.daily-profit-target-pct=0.05
trading.risk.max-drawdown-pct=0.10
