spring.application.name=trading-Bot

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# POSTGRESQL
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tradingbot}
spring.datasource.username=${DB_USER:tradingbot}
spring.datasource.******
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===============================
# REDIS
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.******

# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=${KAFKA_BROKERS:localhost:9092}
spring.kafka.consumer.group-id=trading-bot
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ===============================
# ACTUATOR / PROMETHEUS
# ===============================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ===============================
# SPRINGDOC / SWAGGER UI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true

# ===============================
# ML SERVICE
# ===============================
ml.service.url=${ML_SERVICE_URL:http://ml-service:8000}

# ===============================
# TRADING CONFIGURATION
# ===============================
trading.symbol=${TRADING_SYMBOL:EURUSD}
trading.timeframe=${TRADING_TIMEFRAME:M1}
trading.mode=${TRADING_MODE:PAPER}
trading.candles.lookback=250
trading.balance.initial=${INITIAL_BALANCE:1000.00}
trading.interval.ms=60000

# Rule engine thresholds (all configurable)
trading.rules.buy-rsi-min=55
trading.rules.sell-rsi-max=45
trading.rules.adx-min=25
trading.rules.ml-confidence-threshold=0.75
trading.rules.expiry-seconds=60
trading.rules.stake-amount=10.00
trading.rules.payout-percent=80

# Risk management
trading.risk.daily-loss-limit-pct=0.02
trading.risk.max-consecutive-losses=3
trading.risk.daily-profit-target-pct=0.05
trading.risk.max-drawdown-pct=0.10
