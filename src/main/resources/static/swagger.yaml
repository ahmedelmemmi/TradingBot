openapi: "3.0.3"
info:
  title: TradingBot API
  version: "2.0.0"
  description: |
    REST API for the TradingBot — a single-strategy, quality-focused trading system.

    ## Strategy
    **RobustTrendBreakoutStrategy** (sole active strategy):
    Five entry conditions that must ALL be met:
    1. MA20 > MA50 (uptrend)
    2. (MA20 − MA50) / MA50 ≥ 0.3% (trend strength — filters weak crossovers)
    3. Close > 20-bar highest high + 0.1% buffer (close-confirmed breakout)
    4. Volume ≥ 1.1× 20-bar average (volume-backed breakout)
    5. RSI(14) > 50 (momentum confirmation)

    Risk management (BacktestEngine):
    - Stop loss: 2.0 × ATR(14) below entry
    - Take profit: 3.5 × ATR(14) above entry
    - Trailing stop: activates when price > entry + 1×ATR, trails at price − 2×ATR
    - Position size: 1% capital risk per trade

    ## Data Providers
    - **MockMarketDataProvider**: Synthetic candles for sanity-check backtests.
    - **YahooFinanceMarketDataProvider**: Historical daily candles (2022-01-01 → 2024-03-14).

    ## Quality Gates (real multi-symbol backtest)
    | Metric | Threshold |
    |---|---|
    | Trade count | ≥ 5 trades |
    | Win rate | ≥ 60% |
    | Profit factor | ≥ 1.2 |
    | Max drawdown | ≤ 25% |

    ## Endpoints
    | Endpoint | Purpose |
    |---|---|
    | GET /broker-state | Current IBKR paper positions |
    | GET /backtest/robust | Sanity-check on mock STRONG_UPTREND data |
    | GET /backtest/real/multi | Primary real-data validation (13 symbols) |
    | GET /backtest/real/multi/diagnostics | Per-symbol filter funnel analysis |
    | GET /backtest/real/multi/tuned | Per-asset parameter sweep for audit/paper-trading readiness |

servers:
  - url: http://localhost:8080
    description: Local development

paths:

  /broker-state:
    get:
      summary: Broker state
      description: Returns current IBKR paper broker positions.
      operationId: brokerState
      responses:
        "200":
          description: Broker positions list

  /backtest/robust:
    get:
      summary: Sanity-check backtest (mock STRONG_UPTREND)
      description: |
        Runs RobustTrendBreakoutStrategy on 1000 bars of mock STRONG_UPTREND data.
        Use this to verify strategy logic hasn't regressed. NOT a substitute for
        real-data validation — use /backtest/real/multi for that.
        Quality gates: win rate ≥60%, profit factor ≥1.2, drawdown ≤25%, trades ≥5.
      operationId: backtestRobust
      responses:
        "200":
          description: Backtest result with quality gate pass/fail report

  /backtest/real/multi:
    get:
      summary: Multi-symbol real-data backtest (primary validation)
      description: |
        Runs RobustTrendBreakoutStrategy on real Yahoo Finance daily data
        (2022-01-01 → 2024-03-14) for 13 major symbols.
        Reports per-symbol metrics and a summary verdict on paper-trading readiness.
        Pass condition: ≥8/13 symbols achieve win rate ≥60%, PF ≥1.2, DD ≤25%, trades ≥5.
      operationId: backtestRealMultiSymbol
      responses:
        "200":
          description: Per-symbol results plus summary verdict

  /backtest/real/multi/diagnostics:
    get:
      summary: Per-symbol filter diagnostics
      description: |
        Bar-by-bar filter funnel for all 13 symbols showing how many bars pass each of
        the five RobustTrendBreakoutStrategy conditions (uptrend, trend strength,
        breakout, volume, RSI). Use this to understand why a symbol generates few trades.
      operationId: multiAssetFilterDiagnostics
      responses:
        "200":
          description: Per-symbol filter funnel with bottleneck identification

  /backtest/real/multi/tuned:
    get:
      summary: Per-asset parameter sweep (audit / paper-trading readiness)
      description: |
        Runs a parameter sweep across 13 major symbols, relaxing one filter at a time
        until ≥8 trades AND quality metrics (winRate≥50%, PF≥1.0, DD≤30%) are achieved.
        Returns per-asset best parameters and an audit summary on paper-trading readiness.
        Stop condition: ≥8/13 assets achieve PASS status.
      operationId: multiAssetTunedBacktest
      responses:
        "200":
          description: Per-asset tuned results plus paper-trading audit summary
