openapi: "3.0.3"
info:
  title: TradingBot API
  version: "1.0.0"
  description: |
    REST API for the TradingBot backtesting and live-trading system.

    ## Strategies
    - **RobustTrendBreakoutStrategy** (primary): MA20 > MA50, 20-bar price breakout, RSI > 50.
    - **SimplifiedBreakoutStrategy**: 5-condition filter (ATR, volume, 5-bar breakout, RSI, regime).
    - **PerfectBreakoutStrategy**: Used in legacy mock-data endpoints.

    ## Data Providers
    - **MockMarketDataProvider**: Synthetic candles for multiple market scenarios.
    - **YahooFinanceMarketDataProvider**: Historical daily candles via Yahoo Finance.
    - *(Planned)* **LiveMarketDataProvider**: Real-time streaming candles.

    ## Quality Gates (real multi-symbol backtest)
    | Metric | Threshold |
    |---|---|
    | Trade count | ≥ 8 |
    | Win rate | ≥ 50 % |
    | Profit factor | ≥ 1.0 |
    | Max drawdown | ≤ 30 % |

    ---
    **Adding new endpoints:** implement a `@GetMapping` in `TestController`, document the path here,
    and add request/response schemas in the `components/schemas` section.

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Diagnostics
    description: System health, strategy and regime checks
  - name: Mock Backtests
    description: Backtests on synthetic (mock) candle data
  - name: Real Backtests
    description: Backtests on historical data fetched from Yahoo Finance
  - name: Debug
    description: Deep-dive debug endpoints for candle / signal / trade anatomy
  - name: Broker
    description: Paper-order and broker-state endpoints
  - name: Planned
    description: Endpoints not yet implemented — placeholders for future work

paths:

  # ─── DIAGNOSTICS ──────────────────────────────────────────────────────────

  /test:
    get:
      tags: [Diagnostics]
      summary: Strategy smoke-test
      description: |
        Generates 50 bars of SIDEWAYS_VOLATILE mock data, runs TradeDecisionService,
        and returns the latest trade decision together with open/closed positions.
      operationId: testStrategy
      responses:
        "200":
          description: Trade decision and current position state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeDecisionResponse"

  /regime-test:
    get:
      tags: [Diagnostics]
      summary: Regime detection test
      description: |
        Generates 500 bars of STRONG_DOWNTREND mock data and runs the MarketRegimeService
        to verify regime classification.
      operationId: regimeTest
      responses:
        "200":
          description: Detected regime, last price, and candle count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegimeTestResponse"

  /regime-debug:
    get:
      tags: [Diagnostics]
      summary: Regime debug metrics
      description: |
        Generates 500 bars of CRASH mock data and returns raw regime-service internal
        metrics (MA values, slope, ATR) for debugging.
      operationId: regimeDebug
      responses:
        "200":
          description: Regime debug metrics map
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /backtest/validate:
    get:
      tags: [Diagnostics]
      summary: Validation gate check (mock uptrend)
      description: |
        Runs PerfectBreakoutStrategy on 1000 bars of STRONG_UPTREND mock data and
        evaluates BacktestValidationResult quality gates.  Returns pass/fail per metric
        together with summary statistics.
      operationId: validateBacktest
      responses:
        "200":
          description: Validation result with quality gate pass/fail flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestValidationResponse"

  # ─── MOCK BACKTESTS ───────────────────────────────────────────────────────

  /backtest/random:
    get:
      tags: [Mock Backtests]
      summary: Random-scenario backtest (PerfectBreakoutStrategy)
      description: |
        Runs PerfectBreakoutStrategy on 1000 bars of RANDOM mock candles for AAPL.
      operationId: backtestRandom
      responses:
        "200":
          description: Backtest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResult"

  /backtest/uptrend:
    get:
      tags: [Mock Backtests]
      summary: Uptrend-scenario backtest (PerfectBreakoutStrategy)
      description: |
        Runs PerfectBreakoutStrategy on 1000 bars of STRONG_UPTREND mock candles for AAPL.
      operationId: backtestUptrend
      responses:
        "200":
          description: Backtest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResult"

  /backtest/crash:
    get:
      tags: [Mock Backtests]
      summary: Crash-scenario backtest (PerfectBreakoutStrategy)
      description: |
        Runs PerfectBreakoutStrategy on 1000 bars of CRASH mock candles for AAPL.
        Validates that the strategy avoids trading in crash conditions.
      operationId: backtestCrash
      responses:
        "200":
          description: Backtest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResult"

  /backtest/volatile:
    get:
      tags: [Mock Backtests]
      summary: Volatile-sideways backtest (PerfectBreakoutStrategy)
      description: |
        Runs PerfectBreakoutStrategy on 1000 bars of SIDEWAYS_VOLATILE mock candles.
      operationId: backtestVolatile
      responses:
        "200":
          description: Backtest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResult"

  /backtest/portfolio:
    get:
      tags: [Mock Backtests]
      summary: Multi-symbol portfolio backtest (mock, random)
      description: |
        Runs PerfectBreakoutStrategy on 1000 bars of RANDOM mock data for AAPL, MSFT,
        NVDA, and TSLA. Returns a map keyed by symbol.
      operationId: backtestPortfolio
      responses:
        "200":
          description: Map of symbol → BacktestResult
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/BacktestResult"

  /backtest/portfolio/pro:
    get:
      tags: [Mock Backtests]
      summary: Professional portfolio backtest (mock, mixed scenarios)
      description: |
        Runs PerfectBreakoutStrategy on 1500 bars per symbol using different mock scenarios
        (AAPL=SIDEWAYS_VOLATILE, MSFT=STRONG_UPTREND, NVDA=CRASH, TSLA=RANDOM).
      operationId: runPortfolioBacktest
      responses:
        "200":
          description: Portfolio-level backtest result (aggregate + per-symbol)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioBacktestResult"

  /backtest/hybrid:
    get:
      tags: [Mock Backtests]
      summary: Hybrid backtest (mock random, regime-aware)
      description: |
        Runs the regime-aware hybrid engine on 1000 bars of RANDOM mock data for AAPL.
        Combines multiple sub-strategy results.
      operationId: backtestHybrid
      responses:
        "200":
          description: Hybrid backtest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResultMap"

  /backtest/mock/uptrend:
    get:
      tags: [Mock Backtests]
      summary: Mock uptrend backtest via MarketDataProvider abstraction
      description: |
        Uses MockMarketDataProvider with STRONG_UPTREND scenario and SimplifiedBreakoutStrategy.
        Demonstrates the provider-abstraction layer that also supports live data sources.
      operationId: backtestMockUptrend
      responses:
        "200":
          description: Backtest result with provider name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderBacktestResult"

  /backtest/mock/random:
    get:
      tags: [Mock Backtests]
      summary: Mock random backtest via MarketDataProvider abstraction
      description: |
        Uses MockMarketDataProvider with RANDOM scenario and SimplifiedBreakoutStrategy.
      operationId: backtestMockRandom
      responses:
        "200":
          description: Backtest result with provider name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderBacktestResult"

  /backtest/uptrend-only:
    get:
      tags: [Mock Backtests]
      summary: Uptrend-only backtest (RobustTrendBreakoutStrategy)
      description: |
        Runs RobustTrendBreakoutStrategy on 1000 bars of STRONG_UPTREND mock data.
        Strategy conditions: MA20 > MA50, 20-bar price breakout close, RSI > 50.
        This endpoint consistently returns high win rate on pure uptrend mock data.
      operationId: backtestUptrendOnly
      responses:
        "200":
          description: Uptrend-only backtest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UptrendOnlyResult"

  /backtest/robust:
    get:
      tags: [Mock Backtests]
      summary: Robust strategy backtest with quality gates (mock)
      description: |
        Runs RobustTrendBreakoutStrategy on 1000 bars of STRONG_UPTREND mock data and
        evaluates quality gates: trade count ≥ 5, win rate ≥ 60 %, profit factor ≥ 1.2,
        max drawdown ≤ 25 %.
      operationId: backtestRobust
      responses:
        "200":
          description: Backtest result with inline quality-gate pass/fail flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RobustBacktestResult"

  /backtest/hybrid-uptrend-only:
    get:
      tags: [Mock Backtests]
      summary: Hybrid uptrend-only backtest (mixed mock, regime-gated)
      description: |
        Generates RANDOM mock data (covering multiple regimes) but only executes trades
        when MarketRegimeService detects STRONG_UPTREND.  Demonstrates regime-aware
        trade filtering.
      operationId: backtestHybridUptrendOnly
      responses:
        "200":
          description: Backtest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResultMap"

  /backtest/tradelog:
    get:
      tags: [Mock Backtests]
      summary: Export trade log as CSV
      description: |
        Returns a plain-text CSV of all completed trades from the last in-memory backtest run.
        Columns: symbol, side, entryPrice, exitPrice, pnl, entryTime, exitTime.
      operationId: tradeLogCsv
      responses:
        "200":
          description: CSV trade log
          content:
            text/plain:
              schema:
                type: string
                example: "symbol,side,entryPrice,exitPrice,pnl\nAAPL,BUY,182.00,190.50,8.50\n"

  # ─── REAL BACKTESTS ───────────────────────────────────────────────────────

  /backtest/real/spy-2years-uptrend-only:
    get:
      tags: [Real Backtests]
      summary: SPY 2-year real-data backtest (uptrend-only)
      description: |
        Fetches SPY daily candles for approximately 2 years via YahooFinanceMarketDataProvider
        and runs RobustTrendBreakoutStrategy in uptrend-only mode.
      operationId: backtestRealSPYUptrendOnly
      responses:
        "200":
          description: Real SPY backtest result with signal diagnostics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResultMap"

  /backtest/real/multi:
    get:
      tags: [Real Backtests]
      summary: Multi-symbol real-data backtest (2022-01-01 → 2024-03-14)
      description: |
        Fetches historical daily candles for 13 symbols (SPY, QQQ, AAPL, MSFT, NVDA,
        GOOG, AMZN, META, TSLA, IWM, XLF, XLE, XLV) from Yahoo Finance and runs
        SimplifiedBreakoutStrategy on each.  Each symbol result includes validation
        against quality gates.
      operationId: backtestRealMultiSymbol
      responses:
        "200":
          description: Multi-symbol backtest results with per-symbol validation and summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultiSymbolBacktestResponse"

  /backtest/real/multi/diagnostics:
    get:
      tags: [Real Backtests]
      summary: Per-asset filter-funnel diagnostics
      description: |
        For each of the 13 quality-backtest symbols, runs a bar-by-bar filter funnel using
        the current SimplifiedBreakoutStrategy thresholds and reports how many bars pass
        each successive gate (regime, ATR, volume, breakout, RSI).  Identifies the
        "bottleneck" — the first filter that drops the most bars — so you know which
        parameter to loosen first.
      operationId: multiAssetFilterDiagnostics
      responses:
        "200":
          description: Filter-funnel counts and bottleneck identification per symbol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilterDiagnosticsResponse"

  /backtest/real/multi/tuned:
    get:
      tags: [Real Backtests]
      summary: Multi-symbol real-data backtest with tuned parameters
      description: |
        Same as `/backtest/real/multi` but applies per-symbol tuned strategy parameters
        based on diagnostics output to improve trade counts and quality metrics.
      operationId: multiAssetTunedBacktest
      responses:
        "200":
          description: Tuned multi-symbol backtest results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultiSymbolBacktestResponse"

  # ─── DEBUG ────────────────────────────────────────────────────────────────

  /backtest/debug-perfect-breakout:
    get:
      tags: [Debug]
      summary: Debug PerfectBreakoutStrategy signal generation
      description: |
        Runs PerfectBreakoutStrategy on mock data with verbose per-bar signal logging.
        Returns bar-level condition evaluations to diagnose why signals are or are not fired.
      operationId: debugPerfectBreakout
      responses:
        "200":
          description: Per-bar signal debug information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugResponse"

  /backtest/debug-simplified-breakout:
    get:
      tags: [Debug]
      summary: Debug SimplifiedBreakoutStrategy signal generation
      description: |
        Runs SimplifiedBreakoutStrategy on mock data with verbose per-bar condition
        logging (ATR, volume, breakout level, RSI, regime).
      operationId: debugSimplifiedBreakout
      responses:
        "200":
          description: Per-bar signal debug information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugResponse"

  /backtest/debug/real-data:
    get:
      tags: [Debug]
      summary: Real-data candle quality diagnostics
      description: |
        Downloads real SPY candles from Yahoo Finance and performs a full data-quality
        audit: OHLCV completeness, price continuity, volume outliers, etc.
      operationId: debugRealData
      responses:
        "200":
          description: Data quality diagnostics report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugResponse"

  /backtest/debug/real-data-breakout-test:
    get:
      tags: [Debug]
      summary: Real-data breakout level test
      description: |
        Downloads real SPY candles and evaluates breakout levels bar-by-bar to verify
        the breakout detection logic against real market data.
      operationId: testBreakoutLevels
      responses:
        "200":
          description: Breakout-level diagnostics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugResponse"

  /backtest/debug/real-data-candle-anatomy:
    get:
      tags: [Debug]
      summary: Real-data candle anatomy
      description: |
        Downloads real candles and prints the anatomy of representative bullish, bearish,
        and doji bars together with derived ATR and volume-ratio values.
      operationId: candleAnatomy
      responses:
        "200":
          description: Candle anatomy report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugResponse"

  /backtest/debug/real-trade-anatomy:
    get:
      tags: [Debug]
      summary: Real-data trade anatomy (entry/exit step-through)
      description: |
        Downloads real SPY candles and walks through the complete entry → exit lifecycle
        of each trade produced by SimplifiedBreakoutStrategy, logging every condition
        evaluation and risk-management calculation.
      operationId: realTradeAnatomy
      responses:
        "200":
          description: Step-by-step trade anatomy report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugResponse"

  # ─── BROKER ───────────────────────────────────────────────────────────────

  /test-order:
    get:
      tags: [Broker]
      summary: Submit a test paper order via IBKR broker adapter
      description: |
        Submits a hardcoded BUY order for AAPL at $180 (qty=1, SL=175, TP=190) via the
        IBKR broker adapter in paper-trading mode.  Returns a plain-text confirmation.
      operationId: testOrder
      responses:
        "200":
          description: Paper order submission confirmation
          content:
            text/plain:
              schema:
                type: string
                example: "Paper order submitted"

  /broker-state:
    get:
      tags: [Broker]
      summary: Current broker position state
      description: |
        Returns all open positions currently tracked by the BrokerStateService.
      operationId: brokerState
      responses:
        "200":
          description: List of open broker positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrokerPosition"

  # ─── PLANNED (not yet implemented) ────────────────────────────────────────

  /backtest/real/spy-2years:
    get:
      tags: [Planned]
      summary: "[PLANNED] SPY 2-year real backtest"
      description: |
        **NOT YET IMPLEMENTED.**
        Will fetch 2 years of SPY daily candles from Yahoo Finance and run
        RobustTrendBreakoutStrategy.  Quality gates: win rate ≥ 50 %, profit factor ≥ 1.0,
        drawdown ≤ 30 %, trade count ≥ 8.
      operationId: backtestRealSpy2Years
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplemented"

  /backtest/real/qqq-2years:
    get:
      tags: [Planned]
      summary: "[PLANNED] QQQ 2-year real backtest"
      description: |
        **NOT YET IMPLEMENTED.**
        Will fetch 2 years of QQQ daily candles from Yahoo Finance and run
        RobustTrendBreakoutStrategy.
      operationId: backtestRealQqq2Years
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplemented"

  /backtest/real/aapl-2years:
    get:
      tags: [Planned]
      summary: "[PLANNED] AAPL 2-year real backtest"
      description: |
        **NOT YET IMPLEMENTED.**
        Will fetch 2 years of AAPL daily candles from Yahoo Finance and run
        RobustTrendBreakoutStrategy.
      operationId: backtestRealAapl2Years
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplemented"

  /backtest/real/nvda-2years:
    get:
      tags: [Planned]
      summary: "[PLANNED] NVDA 2-year real backtest"
      description: |
        **NOT YET IMPLEMENTED.**
        Will fetch 2 years of NVDA daily candles from Yahoo Finance and run
        RobustTrendBreakoutStrategy.
      operationId: backtestRealNvda2Years
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplemented"

  /backtest/mock/spread:
    get:
      tags: [Planned]
      summary: "[PLANNED] Mock spread/slippage backtest"
      description: |
        **NOT YET IMPLEMENTED.**
        Will run RobustTrendBreakoutStrategy on mock uptrend data with configurable
        bid-ask spread and slippage to model realistic execution costs.
      operationId: backtestMockSpread
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplemented"

  /live/spy:
    get:
      tags: [Planned]
      summary: "[PLANNED] Live SPY paper trading"
      description: |
        **NOT YET IMPLEMENTED.**
        Will connect to a live market data source, evaluate RobustTrendBreakoutStrategy
        in real-time, and submit paper orders via the IBKR broker adapter.
      operationId: liveSpy
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplemented"

  /live/qqq:
    get:
      tags: [Planned]
      summary: "[PLANNED] Live QQQ paper trading"
      description: |
        **NOT YET IMPLEMENTED.**
        Same as `/live/spy` but for QQQ.
      operationId: liveQqq
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplemented"

  /live/aapl:
    get:
      tags: [Planned]
      summary: "[PLANNED] Live AAPL paper trading"
      description: |
        **NOT YET IMPLEMENTED.**
        Same as `/live/spy` but for AAPL.
      operationId: liveAapl
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplemented"

# ─── COMPONENTS ─────────────────────────────────────────────────────────────

components:
  schemas:

    # ── Shared primitives ────────────────────────────────────────────────────

    BacktestResult:
      type: object
      description: Core backtest output returned by BacktestEngine.runStrategy()
      properties:
        symbol:
          type: string
          example: AAPL
        totalCandles:
          type: integer
          example: 1000
        totalTrades:
          type: integer
          example: 12
        winningTrades:
          type: integer
          example: 8
        losingTrades:
          type: integer
          example: 4
        winRate:
          type: number
          format: double
          example: 0.6667
        profitFactor:
          type: number
          format: double
          example: 1.85
        totalPnL:
          type: number
          format: double
          example: 342.50
        startCapital:
          type: number
          format: double
          example: 10000.0
        endCapital:
          type: number
          format: double
          example: 10342.50
        maxDrawdown:
          type: number
          format: double
          description: Maximum peak-to-trough drawdown as a fraction (e.g. 0.12 = 12 %)
          example: 0.12
        expectancy:
          type: number
          format: double
          example: 28.54
        equityCurve:
          type: array
          items:
            type: number
            format: double

    BacktestResultMap:
      type: object
      description: Flat map of named result fields (returned by endpoints that build results inline)
      properties:
        strategy:
          type: string
        dataSource:
          type: string
        totalCandles:
          type: integer
        totalTrades:
          type: integer
        winRate:
          type: number
          format: double
        profitFactor:
          type: number
          format: double
        totalPnL:
          type: number
          format: double
        startCapital:
          type: number
          format: double
        endCapital:
          type: number
          format: double
        maxDrawdown:
          type: number
          format: double
      additionalProperties: true

    PortfolioBacktestResult:
      type: object
      description: Aggregate portfolio-level backtest result from PortfolioBacktestEngine
      properties:
        totalPnL:
          type: number
          format: double
        startCapital:
          type: number
          format: double
        endCapital:
          type: number
          format: double
        totalTrades:
          type: integer
        winningTrades:
          type: integer
        losingTrades:
          type: integer
        winRate:
          type: number
          format: double
        profitFactor:
          type: number
          format: double
        maxDrawdown:
          type: number
          format: double
        symbolResults:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/BacktestResult"

    ProviderBacktestResult:
      type: object
      description: Backtest result that also exposes the data-provider name (supports mock and real providers)
      properties:
        provider:
          type: string
          example: MockMarketDataProvider-STRONG_UPTREND
        strategy:
          type: string
          example: SimplifiedBreakoutStrategy
        totalCandles:
          type: integer
        totalTrades:
          type: integer
        winRate:
          type: number
          format: double
        totalPnL:
          type: number
          format: double
        startCapital:
          type: number
          format: double
        endCapital:
          type: number
          format: double
        maxDrawdown:
          type: number
          format: double

    UptrendOnlyResult:
      type: object
      description: Result from the uptrend-only RobustTrendBreakoutStrategy endpoint
      properties:
        mode:
          type: string
          example: uptrend-only
        dataScenario:
          type: string
          example: STRONG_UPTREND
        strategy:
          type: string
          example: RobustTrendBreakoutStrategy
        totalCandles:
          type: integer
        totalTrades:
          type: integer
        winRate:
          type: number
          format: double
        profitFactor:
          type: number
          format: double
        totalPnL:
          type: number
          format: double
        startCapital:
          type: number
          format: double
        endCapital:
          type: number
          format: double
        maxDrawdown:
          type: number
          format: double
        note:
          type: string
          example: "RobustTrendBreakoutStrategy: MA20>MA50 + 20-bar breakout + RSI>50"

    RobustBacktestResult:
      allOf:
        - $ref: "#/components/schemas/BacktestResultMap"
        - type: object
          properties:
            qualityGates:
              type: object
              properties:
                tradeCount_pass:
                  type: string
                  example: "true (≥5, got 9)"
                winRate_pass:
                  type: string
                  example: "true (≥60%)"
                profitFactor_pass:
                  type: string
                  example: "true (≥1.2)"
                drawdown_pass:
                  type: string
                  example: "true (≤25%)"
                overall:
                  type: string
                  example: "✅ ALL QUALITY GATES PASS"

    BacktestValidationResponse:
      type: object
      description: Output of BacktestValidationService.validate()
      properties:
        valid:
          type: boolean
        totalTrades:
          type: integer
        winRate:
          type: number
          format: double
        expectancy:
          type: number
          format: double
        profitFactor:
          type: number
          format: double
        maxDrawdown:
          type: number
          format: double
        avgWin:
          type: number
          format: double
        avgLoss:
          type: number
          format: double
        tradeCountPass:
          type: boolean
        winRatePass:
          type: boolean
        expectancyPass:
          type: boolean
        profitFactorPass:
          type: boolean
        drawdownPass:
          type: boolean

    # ── Multi-symbol schemas ─────────────────────────────────────────────────

    SymbolBacktestResult:
      type: object
      description: Per-symbol result within a multi-symbol backtest response
      properties:
        symbol:
          type: string
          example: SPY
        totalCandles:
          type: integer
          example: 552
        totalTrades:
          type: integer
          example: 10
        winningTrades:
          type: integer
        losingTrades:
          type: integer
        winRate:
          type: number
          format: double
        profitFactor:
          type: number
          format: double
        totalPnL:
          type: number
          format: double
        startCapital:
          type: number
          format: double
          example: 10000.0
        endCapital:
          type: number
          format: double
        maxDrawdown:
          type: number
          format: double
        expectancy:
          type: number
          format: double
        validation:
          $ref: "#/components/schemas/SymbolValidation"
        status:
          type: string
          enum: [PASS, FAIL, ERROR]

    SymbolValidation:
      type: object
      properties:
        winRate_pass:
          type: string
          example: "true (≥50%)"
        profitFactor_pass:
          type: string
          example: "true (≥1.0)"
        drawdown_pass:
          type: string
          example: "true (≤30%)"
        tradeCount_pass:
          type: string
          example: "true (≥8 trades)"
        overall:
          type: string
          example: "✅ PASS"

    MultiSymbolSummary:
      type: object
      properties:
        symbolsTested:
          type: integer
          example: 13
        symbolsPassed:
          type: integer
          example: 9
        symbolsFailed:
          type: integer
          example: 4
        passRate:
          type: string
          example: "0.6923"
        overall:
          type: string
          example: "✅ ALL SYMBOLS PASSED"

    MultiSymbolBacktestResponse:
      type: object
      description: Top-level response for multi-symbol backtest endpoints
      properties:
        provider:
          type: string
          example: YahooFinanceMarketDataProvider
        strategy:
          type: string
          example: SimplifiedBreakoutStrategy
        dateFrom:
          type: string
          format: date-time
          example: "2022-01-01T00:00"
        dateTo:
          type: string
          format: date-time
          example: "2024-03-14T23:59"
        symbols:
          type: array
          items:
            type: string
          example: [SPY, QQQ, AAPL, MSFT]
        results:
          type: array
          items:
            $ref: "#/components/schemas/SymbolBacktestResult"
        summary:
          $ref: "#/components/schemas/MultiSymbolSummary"

    # ── Diagnostics schemas ──────────────────────────────────────────────────

    FilterFunnel:
      type: object
      description: Bar counts at each successive filter gate for a single symbol
      properties:
        c1_regime_STRONG_UPTREND:
          type: string
          example: "37/492 bars"
        c2_atr_above_0.90%:
          type: string
          example: "18/37 bars"
        c3_volume_above_50.00%:
          type: string
          example: "18/18 bars"
        c4_breakout_buf_0.05%:
          type: string
          example: "6/18 bars"
        c5_rsi_above_50:
          type: string
          example: "6/6 bars"
        all_conditions_met:
          type: string
          example: "6 bars"

    SymbolFilterDiagnostics:
      type: object
      properties:
        symbol:
          type: string
          example: SPY
        totalCandles:
          type: integer
          example: 552
        filterFunnel:
          $ref: "#/components/schemas/FilterFunnel"
        bottleneck:
          type: string
          example: "c1_regime_STRONG_UPTREND — drops from 492 to 37 bars (92.5 % loss)"

    FilterDiagnosticsResponse:
      type: object
      properties:
        description:
          type: string
        defaultParams:
          type: object
          properties:
            regimeSlopeThreshold:
              type: string
              example: "3.00% (MA20/MA50 slope)"
            atrThreshold:
              type: string
              example: "0.90% of price"
            breakoutBuffer:
              type: string
              example: "0.05% above 5-bar high"
            volumeRatioMin:
              type: string
              example: "50.00% of 20-bar avg volume"
            rsiMin:
              type: string
              example: "50"
        dateFrom:
          type: string
          format: date-time
        dateTo:
          type: string
          format: date-time
        results:
          type: array
          items:
            $ref: "#/components/schemas/SymbolFilterDiagnostics"

    RegimeTestResponse:
      type: object
      properties:
        regime:
          type: string
          enum: [STRONG_UPTREND, SIDEWAYS, HIGH_VOLATILITY, STRONG_DOWNTREND, CRASH]
          example: STRONG_UPTREND
        lastPrice:
          type: number
          format: double
          example: 183.42
        candles:
          type: integer
          example: 500

    TradeDecisionResponse:
      type: object
      properties:
        decision:
          type: object
          properties:
            action:
              type: string
              enum: [BUY, SELL, HOLD]
            symbol:
              type: string
            price:
              type: number
              format: double
            quantity:
              type: number
              format: double
            stopLoss:
              type: number
              format: double
            takeProfit:
              type: number
              format: double
        openPositions:
          type: array
          items:
            $ref: "#/components/schemas/Position"
        closedPositions:
          type: array
          items:
            $ref: "#/components/schemas/Position"

    # ── Broker schemas ───────────────────────────────────────────────────────

    BrokerPosition:
      type: object
      properties:
        symbol:
          type: string
        quantity:
          type: number
          format: double
        avgPrice:
          type: number
          format: double
        unrealizedPnL:
          type: number
          format: double
      additionalProperties: true

    Position:
      type: object
      properties:
        symbol:
          type: string
        entryPrice:
          type: number
          format: double
        exitPrice:
          type: number
          format: double
        quantity:
          type: number
          format: double
        pnl:
          type: number
          format: double
        status:
          type: string
          enum: [OPEN, CLOSED]
      additionalProperties: true

    # ── Debug schema ─────────────────────────────────────────────────────────

    DebugResponse:
      type: object
      description: Generic debug/diagnostic response (schema varies per endpoint)
      additionalProperties: true

    # ── Planned endpoint schema ───────────────────────────────────────────────

    NotImplemented:
      type: object
      description: Placeholder for endpoints that are planned but not yet implemented
      properties:
        status:
          type: integer
          example: 501
        message:
          type: string
          example: "Not implemented yet"
